    <style>
        body { 
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%); 
            color: #f8fafc; 
            font-family: 'Inter', system-ui, sans-serif; 
            min-height: 100vh;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(56, 189, 248, 0.2); 
            border-radius: 1.5rem; 
            padding: 2.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .glow-text {
            background: linear-gradient(to right, #22d3ee, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .thumb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 0.75rem; max-height: 140px; overflow-y: auto; margin-top: 1.5rem;}
        .thumb-grid img { width: 100%; height: 60px; object-fit: cover; border-radius: 0.75rem; border: 2px solid #334155; transition: transform 0.2s; }
        .thumb-grid img:hover { transform: scale(1.1); border-color: #22d3ee; }
        input { background: rgba(2, 6, 23, 0.5); border: 1px solid #334155; color: white; padding: 0.75rem 1rem; border-radius: 0.75rem; width: 100%; outline: none; margin-top: 0.5rem; transition: all 0.3s; }
        input:focus { border-color: #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

    </style>
</head>
<body class="p-4 md:p-8 max-w-6xl mx-auto flex flex-col justify-between">

    <main>

                INITIALIZING CORE...
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">

                    </div>

                        + INGEST DATASET BETA
                    </button>

        </p>

<script>
    let classifier, mobilenetModule;
    const trainingImages = { 0: [], 1: [] };
    let serializedWeights = ""; 

    async function init() {
        classifier = knnClassifier.create();
        mobilenetModule = await mobilenet.load({version: 2, alpha: 1.0});
        const stat = document.getElementById('status');
        stat.innerText = "SYSTEM READY ✓";
        stat.className = "mt-4 md:mt-0 px-6 py-2 bg-emerald-950/50 text-emerald-400 rounded-full text-sm font-mono tracking-widest border border-emerald-500/50 shadow-[0_0_15px_rgba(16,185,129,0.2)]";
    }
    init();

    function handleUpload(event, classId) {
        const files = event.target.files;
        const grid = document.getElementById(`grid-${classId}`);
        for (let i = 0; i < files.length; i++) {
            let reader = new FileReader();
            reader.onload = function(e) {
                let img = document.createElement("img");
                img.src = e.target.result;
                grid.appendChild(img);
                img.onload = () => trainingImages[classId].push(img);
            }
            reader.readAsDataURL(files[i]);
        }
    }

    async function trainModel() {
        if(trainingImages[0].length === 0 || trainingImages[1].length === 0) {
            alert("Upload images to both classes to compile the network!"); return;
        }
        
        const btn = document.getElementById('btn-train');
        btn.innerText = "⚙️ EXTRACTING FEATURES...";
        
        await new Promise(r => setTimeout(r, 50)); 
        
        for (let img of trainingImages[0]) {
            const activation = mobilenetModule.infer(img, true);
            classifier.addExample(activation, 0);
        }
        for (let img of trainingImages[1]) {
            const activation = mobilenetModule.infer(img, true);
            classifier.addExample(activation, 1);
        }

        let dataset = classifier.getClassifierDataset();
        let datasetObj = {};
        Object.keys(dataset).forEach((key) => {
            let tensor = dataset[key];
            datasetObj[key] = {
                data: Array.from(tensor.dataSync()),
                shape: tensor.shape
            };
        });
        serializedWeights = JSON.stringify(datasetObj);

        btn.innerText = "✅ NETWORK COMPILED";
        btn.className = "flex-1 bg-emerald-600/80 text-white font-black py-5 rounded-2xl text-xl shadow-[0_10px_30px_rgba(16,185,129,0.3)] border border-emerald-500/50";
        
        const expBtn = document.getElementById('btn-export');
        expBtn.disabled = false;
        expBtn.className = "flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-black py-5 rounded-2xl text-xl shadow-[0_10px_30px_rgba(99,102,241,0.4)] transition transform hover:-translate-y-1 cursor-pointer animate-pulse";
    }

        const c2Emoji = document.getElementById('c2-emoji').value;

        // FANCY EXPORTED APP ATTRIBUTION (Change this text inside the template string!)

<div class="container">
    <div class="main-content">
        <header>
            <div class="logo">⚡</div>
            <h1>${appTitle}</h1>
            <div class="subtitle">Embedded Neural Network Engine</div>

<script>
    const APP_DATA = { c1: "${c1Name}", c1E: "${c1Emoji}", c2: "${c2Name}", c2E: "${c2Emoji}" };
    const rawWeights = ${serializedWeights};
    
    let model, classifier;
    let currentImageElement = null;

    window.addEventListener('load', async () => {
        try {
            model = await mobilenet.load({version: 2, alpha: 1.0});
            classifier = knnClassifier.create();
            
            const dataset = {};
            Object.keys(rawWeights).forEach(classId => {
                const arr = rawWeights[classId].data;
                const shape = rawWeights[classId].shape; 
                dataset[classId] = tf.tensor2d(arr, shape);
            });
            classifier.setClassifierDataset(dataset);
            
            document.getElementById('statusDot').classList.add('ready');
            document.getElementById('statusText').innerText = "AI Engine Online ✓";
        } catch(e) {
            document.getElementById('statusText').innerText = "Engine Error";
            console.error("Initialization Error:", e);
        }
    });

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('previewImage');
            img.onload = () => {
                currentImageElement = img;
                document.getElementById('previewSection').classList.add('visible');
                document.getElementById('uploadArea').style.display = 'none';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function analyzeImage() {
        if(!classifier || classifier.getNumClasses() === 0) {
            alert("The AI engine is still booting up!");
            return;
        }
        const btn = document.getElementById('analyzeBtn');
        btn.disabled = true;
        btn.innerText = "PROCESSING DATA TENSORS...";

        try {
            const activation = model.infer(currentImageElement, true);
            const result = await classifier.predictClass(activation);
            displayResults(result);
        } catch(error) {
            console.error("Inference Error:", error);
            alert("Analysis failed. See console.");
        }
        
        btn.disabled = false;
        btn.innerText = "INITIATE ANALYSIS";
    }

    function displayResults(result) {
        const resultsSection = document.getElementById('resultsSection');
        const animalEl = document.getElementById('resultAnimal');
        const labelEl = document.getElementById('resultLabel');
        const confTextEl = document.getElementById('resultConfidenceText');

        let c1Conf = result.confidences['0'] || 0;
        let c2Conf = result.confidences['1'] || 0;

        if (result.label === '0' || result.label === 0) {
            animalEl.textContent = APP_DATA.c1E;
            labelEl.textContent = "It's " + APP_DATA.c1 + "!";
            labelEl.className = 'result-label cat';
            confTextEl.textContent = "Probability: " + (c1Conf * 100).toFixed(1) + "%";
        } else {
            animalEl.textContent = APP_DATA.c2E;
            labelEl.textContent = "It's " + APP_DATA.c2 + "!";
            labelEl.className = 'result-label dog';
            confTextEl.textContent = "Probability: " + (c2Conf * 100).toFixed(1) + "%";
        }

        const c1Pct = (c1Conf * 100).toFixed(1);
        const c2Pct = (c2Conf * 100).toFixed(1);

        document.getElementById('catPercent').textContent = c1Pct + '%';
        document.getElementById('dogPercent').textContent = c2Pct + '%';

        setTimeout(() => {
            document.getElementById('catBar').style.width = c1Pct + '%';
            document.getElementById('dogBar').style.width = c2Pct + '%';
        }, 100);

        resultsSection.classList.add('visible');
    }

    function resetApp() {
        document.getElementById('previewImage').src = '';
